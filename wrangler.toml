name = "wsc"
main = ".svelte-kit/cloudflare/_worker.js"
compatibility_date = "2026-03-26"
compatibility_flags = ["nodejs_compat"]

[assets]
directory = ".svelte-kit/cloudflare/assets"
binding = "ASSETS"

[observability]
enabled = true

[[routes]]
pattern = "wsc.theserverless.dev"
custom_domain = true
