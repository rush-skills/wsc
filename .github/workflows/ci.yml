name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20, 22]

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run check

      - name: Run tests
        run: npm test

      - name: Build
        run: npm run build

  mcp-server:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: mcp-server/package-lock.json

      - name: Install root dependencies
        run: npm ci

      - name: Install MCP server dependencies
        run: cd mcp-server && npm ci

      - name: Build MCP server
        run: cd mcp-server && npm run build

      - name: Smoke test MCP server
        run: timeout 2 node mcp-server/dist/mcp-server/index.js < /dev/null 2>&1 || true

  cli:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install root dependencies
        run: npm ci

      - name: Install CLI dependencies
        run: cd cli && npm ci

      - name: Build CLI
        run: cd cli && npm run build

      - name: Smoke test - stdin check
        run: echo "The code was written very quickly." | node cli/dist/cli/index.js check --stdin

      - name: Smoke test - clean text
        run: echo "The team wrote good code." | node cli/dist/cli/index.js check --stdin --quiet

      - name: Smoke test - list detectors
        run: node cli/dist/cli/index.js list

      - name: Smoke test - list weasel words
        run: node cli/dist/cli/index.js list weaselWords | head -5

      - name: Smoke test - init
        run: cd /tmp && node "${GITHUB_WORKSPACE}/cli/dist/cli/index.js" init && test -f .wscrc.json && rm .wscrc.json
